pre-commit:
    piped: true
    jobs:
        - name: build
          run: pnpm build

        - name: lint
          glob: '*.{js,ts,mts,tsx,jsx}'
          run: pnpm eslint --fix {staged_files}
          stage_fixed: true

        - name: format
          glob: '*.{js,ts,mts,tsx,jsx,json,yml,yaml,md,css,html}'
          run: pnpm prettier --write {staged_files}
          stage_fixed: true

        - name: typecheck
          run: pnpm typecheck

        - name: test
          run: pnpm vitest run --changed
